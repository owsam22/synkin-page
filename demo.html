<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synkin — demo animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0d;
    --surface:#15171b;
    --border:#25282e;
    --text:#f2f3f1;
    --text-dim:#a2a7ad;
    --accent:#39d98a;
    --accent-dim:#1f6b48;
    --accent-glow:rgba(57,217,138,0.18);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg); width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace;
    overflow:hidden;
  }
  .stage{
    position:relative;
    width:800px; max-width:96vw;
    aspect-ratio:800/460;
  }
  svg{width:100%; height:100%; display:block;}

  .caption-wrap{
    position:absolute; left:0; right:0; bottom:6%;
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:15px; letter-spacing:0.04em; color:var(--accent);
  }
  .caption{
    position:absolute; left:0; right:0; opacity:0;
  }
  .cap1{animation:cap1 10s infinite;}
  .cap2{animation:cap2 10s infinite;}
  .cap3{animation:cap3 10s infinite;}
  @keyframes cap1{0%,3%{opacity:0;} 8%{opacity:1;} 28%{opacity:1;} 34%{opacity:0;} 100%{opacity:0;}}
  @keyframes cap2{0%,34%{opacity:0;} 39%{opacity:1;} 56%{opacity:1;} 60%{opacity:0;} 100%{opacity:0;}}
  @keyframes cap3{0%,62%{opacity:0;} 68%{opacity:1;} 93%{opacity:1;} 98%{opacity:0;} 100%{opacity:0;}}

  .cable{
    stroke-dasharray:1; stroke-dashoffset:1;
    animation:drawCable 10s infinite;
  }
  @keyframes drawCable{
    0%,14%{stroke-dashoffset:1; opacity:.35;}
    30%{stroke-dashoffset:0; opacity:1;}
    96%{stroke-dashoffset:0; opacity:1;}
    100%{stroke-dashoffset:1; opacity:.35;}
  }

  .plug-pulse{
    transform-origin:center;
    animation:plugPulse 10s infinite;
  }
  @keyframes plugPulse{
    0%,27%{opacity:0; transform:scale(.4);}
    32%{opacity:1; transform:scale(1.4);}
    40%{opacity:0; transform:scale(1.8);}
    100%{opacity:0; transform:scale(.4);}
  }

  .cursor{
    animation:blink 0.9s step-start infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  .typed{
    display:inline-block; overflow:hidden; white-space:nowrap;
    width:0; vertical-align:bottom;
    animation:typing 10s infinite;
  }
  @keyframes typing{
    0%{width:0; animation-timing-function:steps(10,end);}
    35%{width:0; animation-timing-function:steps(10,end);}
    54%{width:10.2ch;}
    100%{width:10.2ch;}
  }

  .status-tag{
    opacity:0; transform:translateY(4px);
    animation:statusFade 10s infinite;
  }
  @keyframes statusFade{
    0%,55%{opacity:0; transform:translateY(4px);}
    60%{opacity:1; transform:translateY(0);}
    92%{opacity:1; transform:translateY(0);}
    98%{opacity:0; transform:translateY(4px);}
    100%{opacity:0; transform:translateY(4px);}
  }

  .phone-glow{
    opacity:0;
    animation:wake 10s infinite;
  }
  @keyframes wake{
    0%,57%{opacity:0;}
    66%{opacity:1;}
    97%{opacity:1;}
    100%{opacity:0;}
  }

  .site-content{
    opacity:0; transform:translateY(8px);
    animation:contentIn 10s infinite;
  }
  @keyframes contentIn{
    0%,60%{opacity:0; transform:translateY(8px);}
    75%{opacity:1; transform:translateY(0);}
    95%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(8px);}
  }
  .site-content.d2{animation-delay:.15s;}
  .site-content.d3{animation-delay:.3s;}
</style>
</head>
<body>

<div class="stage">
  <svg viewBox="0 0 800 460" role="img">
    <title>Synkin demo: connect Android over USB, run synkin run, site opens on device</title>

    <g transform="translate(40,140)">
      <path d="M0,190 L40,220 L300,220 L260,190 Z" fill="#111317" stroke="#25282e" stroke-width="2"/>
      <rect x="0" y="0" width="260" height="190" rx="8" fill="var(--surface)" stroke="var(--border)" stroke-width="2"/>
      <rect x="10" y="10" width="240" height="170" rx="4" fill="var(--bg)"/>

      <rect x="10" y="10" width="240" height="24" rx="4" fill="#1b1e23"/>
      <circle cx="24" cy="22" r="3.2" fill="#3a3d43"/>
      <circle cx="35" cy="22" r="3.2" fill="#3a3d43"/>
      <circle cx="46" cy="22" r="3.2" fill="#3a3d43"/>
      <text x="130" y="26" text-anchor="middle" font-size="10" fill="var(--text-dim)" font-family="JetBrains Mono, monospace">~/project</text>

      <text x="22" y="66" font-size="13" fill="var(--text-dim)" font-family="JetBrains Mono, monospace">$&#160;</text>
      <foreignObject x="34" y="52" width="200" height="24">
        <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text);">
          <span class="typed">synkin run</span><span class="cursor">▌</span>
        </div>
      </foreignObject>

      <g class="status-tag">
        <text x="22" y="90" font-size="12" fill="var(--accent)" font-family="JetBrains Mono, monospace">✓ Bridge ready</text>
      </g>

      <rect x="240" y="150" width="16" height="12" rx="2" fill="#1b1e23" stroke="var(--border)"/>
    </g>

    <g transform="translate(600,90)">
      <rect x="0" y="0" width="150" height="290" rx="24" fill="var(--surface)" stroke="var(--border)" stroke-width="3"/>
      <rect x="10" y="14" width="130" height="262" rx="14" fill="var(--bg)"/>
      <rect class="phone-glow" x="10" y="14" width="130" height="262" rx="14" fill="var(--accent-glow)"/>

      <g class="site-content" clip-path="inset(0 round 14px)">
        <rect x="10" y="14" width="130" height="26" fill="#111317"/>
        <circle cx="24" cy="27" r="2.6" fill="#e2574c"/>
        <circle cx="33" cy="27" r="2.6" fill="#e6b34a"/>
        <circle cx="42" cy="27" r="2.6" fill="var(--accent)"/>
        <rect x="55" y="22" width="70" height="10" rx="3" fill="#1b1e23"/>
      </g>

      <g class="site-content d2">
        <rect x="20" y="52" width="110" height="46" rx="6" fill="var(--accent-glow)" stroke="var(--accent-dim)"/>
        <rect x="30" y="62" width="60" height="6" rx="3" fill="var(--accent)"/>
        <rect x="30" y="74" width="90" height="5" rx="2.5" fill="#2a2d33"/>
        <rect x="30" y="83" width="70" height="5" rx="2.5" fill="#2a2d33"/>
      </g>

      <g class="site-content d3">
        <rect x="20" y="108" width="52" height="52" rx="6" fill="#15171b" stroke="var(--border)"/>
        <rect x="76" y="108" width="52" height="52" rx="6" fill="#15171b" stroke="var(--border)"/>
        <rect x="30" y="118" width="32" height="5" rx="2.5" fill="var(--accent)"/>
        <rect x="30" y="128" width="24" height="4" rx="2" fill="#2a2d33"/>
        <rect x="86" y="118" width="32" height="5" rx="2.5" fill="var(--accent)"/>
        <rect x="86" y="128" width="24" height="4" rx="2" fill="#2a2d33"/>
      </g>

      <rect x="-6" y="140" width="16" height="12" rx="2" fill="#1b1e23" stroke="var(--border)"/>
    </g>

    <path class="cable" d="M314,405 C420,405 420,340 596,235" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linecap="round" pathLength="1"/>
    <circle class="plug-pulse" cx="596" cy="235" r="10" fill="none" stroke="var(--accent)" stroke-width="2"/>
  </svg>

  <div class="caption-wrap">
    <div class="caption cap1">Connect your Android device over USB</div>
    <div class="caption cap2">Run <span style="color:var(--text);">synkin run</span></div>
    <div class="caption cap3">Your site opens instantly on device</div>
  </div>
</div>

</body>
</html>
